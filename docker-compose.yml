name: nebula-hosting

networks:
  nebula-net:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: nebula-hosting-redis
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1
    volumes:
      - redis-data:/data
    networks:
      - nebula-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nebula-hosting-backend
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - nebula-net
    environment:
      - NODE_ENV=production
      - REDIS_HOST=nebula-hosting-redis
      - REDIS_PORT=6379
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend-logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nebula-hosting-frontend
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "3011:80"
    networks:
      - nebula-net
    depends_on:
      - backend

volumes:
  redis-data:
    driver: local
  backend-logs:
    driver: local
